                traits: ["追求极致伤害", "喜欢风险与回报", "擅长秒杀对手", "注重输出能力"],
                scores: { 1: 3, 2: 1, 3: 1, 4: 2 }
            },
            {
                name: "地狱三头犬",
                description: "获得丛刃和强攻符文。大幅提升普攻输出能力，适合依赖普攻的英雄。",
                traits: ["喜欢普攻输出", "擅长持续作战", "追求攻速优势", "注重平A伤害"],
                scores: { 1: 3, 2: 2, 3: 1, 4: 2 }
            },
            {
                name: "秘术冲拳",
                description: "普攻减少基础技能CD，配合虚幻武器可实现技能触发普攻特效，团战中Q/W无限循环，是经典‘电风扇’核心彩色。",
                traits: ["擅长技能连招", "喜欢高频输出", "注重技能急速", "擅长持续作战"],
                scores: { 1: 2, 2: 2, 3: 1, 4: 3 }
            },
            {
                name: "叠角龙",
                description: "叠层效率提升100%，被动叠层是后期核心，可大幅缩短成型时间。适合依赖被动叠层的英雄。",
                traits: ["注重后期发展", "喜欢持续成长", "擅长长期作战", "追求后期优势"],
                scores: { 1: 2, 2: 3, 3: 1, 4: 2 }
            },
            {
                name: "炼狱导管",
                description: "技能命中后造成额外灼烧伤害，持续一段时间。适合技能持续伤害型英雄，如火男、莉莉娅等。",
                traits: ["擅长持续伤害", "喜欢消耗对手", "注重技能命中", "擅长阵地战"],
                scores: { 1: 2, 2: 2, 3: 1, 4: 3 }
            },
            {
                name: "红包",
                description: "击杀或助攻后获得额外金币，加速装备成型。适合需要快速发育的英雄，能更快地做出核心装备。",
                traits: ["注重经济发育", "喜欢快速成型", "擅长击杀和助攻", "追求装备优势"],
                scores: { 1: 3, 2: 2, 3: 1, 4: 2 }
            },
            {
                name: "小丑学院",
                description: "增加技能急速和冷却缩减，提高技能释放频率。适合依赖技能的英雄，能更频繁地释放技能。",
                traits: ["擅长技能输出", "注重技能急速", "喜欢高频释放技能", "擅长技能连招"],
                scores: { 1: 2, 2: 2, 3: 1, 4: 3 }
            },
            {
                name: "尤里卡",
                description: "提供自适应之力和技能急速，根据游戏进程自动调整属性。适合各种类型的英雄，提供全面的属性提升。",
                traits: ["追求全面提升", "适应各种游戏风格", "喜欢灵活应变", "注重整体实力"],
                scores: { 1: 2, 2: 2, 3: 2, 4: 3 }
            },
            {
                name: "夺金",
                description: "用攻击或技能命中敌方英雄后获得金币，持续积累经济优势。适合频繁与敌方互动的英雄。",
                traits: ["注重经济发育", "喜欢持续互动", "擅长积累优势", "追求装备领先"],
                scores: { 1: 2, 2: 3, 3: 1, 4: 2 }
            }
        ];
        
        // 全局变量
        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        
        // DOM 元素
        const questionContainer = document.getElementById('question-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const resultContainer = document.getElementById('result-container');
        const restartBtn = document.getElementById('restart-btn');
        const progressFill = document.querySelector('.progress-fill');
        
        // 渲染问题
        function renderQuestion() {
            const question = questions[currentQuestion];
            questionContainer.innerHTML = `
                <div class="question-number">问题 ${currentQuestion + 1}/${questions.length}</div>
                <div class="question-text">${question.text}</div>
                <div class="options">
                    ${question.options.map((option, index) => `
                        <div class="option ${answers[currentQuestion] === option.value ? 'selected' : ''}" data-value="${option.value}">
                            ${option.text}
                        </div>
                    `).join('')}
                </div>
            `;
            
            // 更新进度条
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            progressFill.style.width = `${progress}%`;
            
            // 更新按钮状态
            prevBtn.disabled = currentQuestion === 0;
            nextBtn.textContent = currentQuestion === questions.length - 1 ? '提交' : '下一题';
            
            // 添加选项点击事件
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', () => {
                    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    answers[currentQuestion] = parseInt(option.dataset.value);
                });
            });
        }
        
        // 计算结果
        function calculateResult() {
            const scores = hextechTypes.map(hextech => {
                let totalScore = 0;
                for (let i = 0; i < answers.length; i++) {
                    totalScore += hextech.scores[answers[i]] || 0;
                }
                return { ...hextech, score: totalScore };
            });
            
            // 按分数排序
            scores.sort((a, b) => b.score - a.score);
            return scores[0];
        }
        
        // 显示结果
        function showResult() {
            const result = calculateResult();
            document.getElementById('hextech-name').textContent = result.name;
            document.getElementById('hextech-description').textContent = result.description;
            document.getElementById('hextech-traits').innerHTML = result.traits.map(trait => `
                <div class="trait">${trait}</div>
            `).join('');
            
            questionContainer.style.display = 'none';
            document.querySelector('.navigation').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            resultContainer.style.display = 'block';
        }
        
        // 事件监听
        prevBtn.addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        });
        
        nextBtn.addEventListener('click', () => {
            // 检查是否选择了选项
            if (answers[currentQuestion] === null) {
                alert('请选择一个选项');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        });
        
        restartBtn.addEventListener('click', () => {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            questionContainer.style.display = 'block';
            document.querySelector('.navigation').style.display = 'flex';
            document.querySelector('.progress-bar').style.display = 'block';
            resultContainer.style.display = 'none';
            renderQuestion();
        });
        
        // 初始化
        renderQuestion();
    </script>
</body>
